<!DOCTYPE html>
<html>
<head>
    <title>Test Tiles API</title>
</head>
<body>
    <h1>Tiles API Test</h1>
    <button onclick="testAPI()">Test /api/tiles</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('/api/tiles', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <h2>API Response:</h2>
                    <p><strong>Success:</strong> ${data.success}</p>
                    <p><strong>Total Tiles:</strong> ${data.tiles ? data.tiles.length : 0}</p>
                    <h3>Document Governance Tiles:</h3>
                    <pre>${JSON.stringify(
                        data.tiles?.filter(t => 
                            t.title?.includes('Document') || 
                            t.tile_category === 'Document Governance' ||
                            t.tile_category === 'Public'
                        ), 
                        null, 
                        2
                    )}</pre>
                    <h3>All Tiles:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2>Error:</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
